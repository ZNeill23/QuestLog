<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QuestLog</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <div class="app">
      <header class="header">
        <h1>QuestLog</h1>
        <p class="subtitle">Track your quests (a fancy to-do list).</p>
      </header>

      <main class="card">
        <form id="questForm" class="form">
          <input
            id="questInput"
            type="text"
            placeholder="Add a new quest..."
            autocomplete="off"
            maxlength="80"
          />
          <button type="submit">Add</button>
        </form>

        <section class="controls">
          <div class="filters" role="tablist" aria-label="Filters">
            <button class="filter active" data-filter="all" type="button">
              All
            </button>
            <button class="filter" data-filter="active" type="button">
              Active
            </button>
            <button class="filter" data-filter="done" type="button">
              Done
            </button>
          </div>

          <button id="clearDoneBtn" class="danger" type="button">
            Clear Done
          </button>
        </section>

        <ul id="questList" class="list" aria-label="Quest list"></ul>

        <footer class="footer">
          <span id="countText">0 quests</span>
        </footer>
      </main>
    </div>

    <script src="js/app.js"></script>
  </body>
</html>
